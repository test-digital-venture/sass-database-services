services:
  postgres:
    restart: "no"
    container_name: postgres
    image: postgres:16
    networks:
      - shared_network
    # env_file: ./.env
    ports:
      - 4601:5432
    environment:
      POSTGRES_USER: ${BASE_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${BASE_PASSWORD}
    volumes:
      - ${DATA_DIR}/pgdata:/var/lib/postgresql/data
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4602:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
  redis:
    image: redis:6.2
    container_name: redis
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4603:6379
    # command: ["redis-server", "--requirepass", "${BASE_PASSWORD}"]
    volumes:
      - ${DATA_DIR}/redis:/data
  mongo:
    image: mongo
    container_name: mongo
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4604:27017
    command: mongod --noauth
    volumes:
      - ${DATA_DIR}/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
  mongo-auth:
    image: mongo
    container_name: mongo-auth
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4605:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${BASE_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${BASE_PASSWORD}
    volumes:
      - ${DATA_DIR}/mongo_auth:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
  # mysql
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4606:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${BASE_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${BASE_USER}
      MYSQL_PASSWORD: ${BASE_PASSWORD}
    volumes:
      - ${DATA_DIR}/mysql:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
  #ElasticSearch
  # elasticsearch:
  #   image: elasticsearch:8.0.0
  #   container_name: elasticsearch
  #   restart: "no"
  #   networks:
  #     - shared_network
  #   ports:
  #     - 9200:9200
  #   environment:
  #     ELASTICSEARCH_USERNAME: ${BASE_USER}
  #     ELASTICSEARCH_PASSWORD: ${BASE_PASSWORD}
  #     # Disable security features for development
  #     discovery.type: single-node
  #     xpack.security.enabled: false
  #     # Memory limits - cap at 4GB
  #     ES_JAVA_OPTS: "-Xms2g -Xmx4g"
  #   volumes:
  #     - ${DATA_DIR}/elasticsearch:/usr/share/elasticsearch/data
  #   # Set memory limits at the container level as well
  #   mem_limit: 4g
  # TiDb
  tidb:
    image: pingcap/tidb
    container_name: tidb
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4607:4000
      - 4608:10080
    # environment:
    #   - MYSQL_ROOT_PASSWORD=${BASE_PASSWORD}
    #   - MYSQL_USER=${BASE_USER}
  adminer:
    image: adminer
    container_name: adminer
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4609:8080
  minio-s3:
    image: quay.io/minio/minio
    container_name: minio-s3
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4610:9000  # API port
      - 4611:9001  # Console port
    environment:
      MINIO_ROOT_USER: ${BASE_USER}
      MINIO_ROOT_PASSWORD: ${BASE_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ${DATA_DIR}/minio:/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4614:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${BASE_USER}@admin.local
      PGADMIN_DEFAULT_PASSWORD: ${BASE_PASSWORD}
    volumes:
      - ${DATA_DIR}/pgadmin:/var/lib/pgadmin
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4615:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${BASE_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${BASE_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${BASE_USER}:${BASE_PASSWORD}@mongo-auth:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo-auth:
        condition: service_healthy
  redisinsight:
    image: redis/redisinsight
    container_name: redisinsight
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4616:5540
    volumes:
      - ${DATA_DIR}/redisinsight:/data
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4617:5672   # AMQP
      - 4618:15672  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${BASE_USER}
      RABBITMQ_DEFAULT_PASS: ${BASE_PASSWORD}
    volumes:
      - ${DATA_DIR}/rabbitmq:/var/lib/rabbitmq
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4619:1025  # SMTP
      - 4620:8025  # Web UI
    volumes:
      - ${DATA_DIR}/mailpit:/data
  meilisearch:
    image: getmeili/meilisearch
    container_name: meilisearch
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4621:7700
    environment:
      MEILI_MASTER_KEY: ${BASE_PASSWORD}
      MEILI_ENV: development
    volumes:
      - ${DATA_DIR}/meilisearch:/meili_data
  redpanda:
    image: redpandadata/redpanda
    container_name: redpanda
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4622:9092   # Kafka API
      - 4623:8081   # Schema Registry
      - 4624:8082   # HTTP Proxy
      - 4625:9644   # Admin API
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:4622
      - --schema-registry-addr 0.0.0.0:8081
      - --pandaproxy-addr 0.0.0.0:8082
    volumes:
      - ${DATA_DIR}/redpanda:/var/lib/redpanda/data
  redpanda-console:
    image: redpandadata/console
    container_name: redpanda-console
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4626:8080
    environment:
      KAFKA_BROKERS: redpanda:29092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URLS: http://redpanda:8081
    depends_on:
      - redpanda
  coredns:
    image: coredns/coredns
    container_name: coredns
    restart: "no"
    networks:
      - shared_network
    ports:
      - 4627:53/udp
      - 4627:53/tcp
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro
    command: -conf /etc/coredns/Corefile
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: "no"
    networks:
      - shared_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 4612:80
      - 4613:443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  portainer_data:
  # minio_data:
  #   driver: local
  # elasticsearch_data:
  #   driver: local
networks:
  shared_network:
    external: true