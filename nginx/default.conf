# Wildcard subdomain reverse proxy for tenant-based routing
# Captures the tenant slug from the subdomain and forwards it to your API

server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.myapp\.local$;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream http://host.docker.internal:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-ID $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Default server for myapp.local (no subdomain)
server {
    listen 80;
    server_name myapp.local;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream http://host.docker.internal:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
